events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Necessário para SockJS: Connection: upgrade só em upgrades WebSocket reais;
    # nas requests HTTP normais (polling, /ws/info) usa Connection: close.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Redireciona HTTP → HTTPS (acesso direto)
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # Porta interna para Cloudflare Tunnel (HTTP sem SSL)
    # Não publicada externamente — acessível apenas dentro da rede Docker.
    # O Cloudflare expõe esta porta via HTTPS com certificado válido.
    server {
        listen 8080;

        location /ws {
            proxy_pass         http://backend:8899;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_buffering    off;
        }

        location ~ ^/(api|auth|v3|swagger-ui|actuator)/ {
            proxy_pass         http://backend:8899;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 60;
        }

        root  /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # --- WebSocket / SockJS ---
        # O SockJS usa múltiplos transportes; todos partem de /ws
        location /ws {
            proxy_pass         http://backend:8899;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_buffering    off;
        }

        # --- API REST e Auth ---
        location ~ ^/(api|auth|v3|swagger-ui|actuator)/ {
            proxy_pass         http://backend:8899;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60;
        }

        # --- Frontend (SPA React) ---
        root  /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
