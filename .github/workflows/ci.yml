name: CI/CD — Q-Manager

on:
  push:
    branches: [main, develop, homologacao]
  pull_request:
    branches: [main, develop, homologacao]

jobs:

  # ════════════════════════════════════════════════════════════
  # 1. TESTES E BUILD DO FRONTEND
  # ════════════════════════════════════════════════════════════
  test-frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: TypeScript — verificação de tipos
        run: npx tsc --noEmit

      - name: Build de produção
        run: npm run build
        env:
          VITE_API_URL: ''
          VITE_WS_URL: '/ws'

      - name: Salvar artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # 2. TESTES E BUILD DO BACKEND
  # ════════════════════════════════════════════════════════════
  test-backend:
    name: Backend — testes & cobertura
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build e testes (Maven)
        run: ./mvnw -B clean verify -Dspring.profiles.active=test

      - name: Relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/

      - name: Relatório de cobertura JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: OWASP Dependency Check
        run: ./mvnw dependency-check:check
        continue-on-error: true

      - name: Relatório OWASP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html

  # ════════════════════════════════════════════════════════════
  # 3. BUILD E PUSH DAS IMAGENS DOCKER → GHCR
  #    Executa apenas em push para main após os testes passarem
  # ════════════════════════════════════════════════════════════
  build-push:
    name: Docker — build & push para GHCR
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/homologacao')

    permissions:
      contents: read
      packages: write   # necessário para push no GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Imagem do backend ────────────────────────────────────
      - name: Build & Push — backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/qmanager-backend:latest
            ghcr.io/${{ github.repository_owner }}/qmanager-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # ── Imagem nginx com frontend embutido ───────────────────
      - name: Build & Push — nginx (com frontend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/qmanager-nginx:latest
            ghcr.io/${{ github.repository_owner }}/qmanager-nginx:${{ github.sha }}
          cache-from: type=gha,scope=nginx
          cache-to:   type=gha,scope=nginx,mode=max

  # ════════════════════════════════════════════════════════════
  # 4. DEPLOY AUTOMÁTICO VIA SSH
  #    Executa após o push das imagens para o GHCR
  #
  #  Secrets necessários no repositório GitHub:
  #    SSH_HOST          → IP público do servidor (atualize quando o IP mudar)
  #    SSH_USER          → usuário Linux do servidor
  #    SSH_PRIVATE_KEY   → chave privada SSH (conteúdo de ~/.ssh/id_rsa)
  #    SSH_PORT          → porta SSH (opcional, padrão: 22)
  #    DEPLOY_PATH       → caminho do projeto no servidor (ex: /home/user/fila-atendimento)
  # ════════════════════════════════════════════════════════════
  deploy:
    name: Deploy — servidor via SSH
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/homologacao')
    environment: production

    steps:
      - name: Deploy no servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "📥 Baixando novas imagens do GHCR..."
            docker compose pull backend nginx

            echo "🔄 Reiniciando serviços..."
            docker compose up -d --no-build

            echo "🧹 Limpando imagens antigas..."
            docker image prune -f

            echo "✅ Deploy concluído!"
            docker compose ps
