services:

  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: qmanager-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-fila_atendimento}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fila_atendimento}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qmanager-net

  # ── Backend Spring Boot ──────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_OWNER:-local}/qmanager-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qmanager-backend
    restart: unless-stopped
    expose:
      - "8899"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Banco — aponta para o serviço 'db' na rede interna Docker
      DB_HOST:      jdbc:postgresql://db:5432/${POSTGRES_DB:-fila_atendimento}
      DB_USER:      ${POSTGRES_USER:-postgres}
      DB_PASSWORD:  ${POSTGRES_PASSWORD}
      # E-mail
      USERNAME_MAIL: ${MAIL_USER}
      PASSWORD_MAIL: ${MAIL_PASSWORD}
      # URLs do frontend (derivadas do IP público)
      QMANAGER_LOGIN_URL: https://${PUBLIC_IP}/login
      QMANAGER_ERROR_URL: https://${PUBLIC_IP}/login?retry=true
      QMANAGER_RESET_URL: https://${PUBLIC_IP}/reset-password
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - qmanager-net

  # ── Nginx: HTTPS + proxy reverso + frontend ──────────────────
  nginx:
    image: ghcr.io/${GITHUB_OWNER:-local}/qmanager-nginx:latest
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: qmanager-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # Certificados gerados pelos scripts (não ficam na imagem — mudam com o IP)
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - qmanager-net

volumes:
  postgres_data:

networks:
  qmanager-net:
    driver: bridge
